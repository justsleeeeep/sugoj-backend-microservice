spring:
  application:
    name: sugoj-backend-judge-service
  # DataSource Config
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.40.135:3306/sugoj
    #    url: jdbc:mysql://192.168.186.129:3306/sugoj
    username: root
    password: 123456
  #    url: jdbc:mysql://localhost:3306/my_db
  #    username: root
  #    password: 123456
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  # session 失效时间（分钟）
  session:
    timeout: 86400
    store-type: redis
  # redis 配置
  redis:
    port: 6379
    #    host: 192.168.186.129
    #    password: "123456"
    host: 192.168.40.135
    #    host: localhost
    database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
server:
  port: 8104
  servlet:
    context-path: /api/judge
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)
#代码沙箱配置
codesandbox:
  type: remote
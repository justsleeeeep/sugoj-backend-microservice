spring:
    cloud:
        nacos:
            discovery:
                server-addr: 127.0.0.1:8848
        gateway:
            routes:
                - id: sugoj-backend-user-service
                  uri: lb://sugoj-backend-user-service
                  predicates:
                      - Path=/api/user/**
                - id: sugoj-backend-question-service
                  uri: lb://sugoj-backend-question-service
                  predicates:
                      - Path=/api/question/**
                - id: sugoj-backend-judge-service
                  uri: lb://sugoj-backend-judge-service
                  predicates:
                      - Path=/api/judge/**
    application:
        name: sugoj-backend-gateway
    main:
        web-application-type: reactive
server:
    port: 8101
knife4j:
  gateway:
    # ? ????????gateway????
    enabled: true
    # ? ??????????????discover???????
    strategy: discover
    discover:
      # ? ????????discover??
      enabled: true
      # ? ??????????????Swagger2?????
      version: swagger2
